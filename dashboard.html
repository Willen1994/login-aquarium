<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .menu-btn { background: transparent; border: none; color: white; font-size: 35px; cursor: pointer; padding: 10px; }
        
        #logoutMenu { 
            display: none; position: fixed; right: 20px; top: 70px; 
            background: #fff; color: #000; border-radius: 8px; z-index: 999999;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); padding: 20px;
        }
        .logout-btn { 
            background: #e0e0e0; border: none; padding: 10px 20px;
            border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <nav>
        <h2>May Dashboard</h2>
        <button id="hamburger" class="menu-btn"><i class='bx bx-menu'></i></button>
    </nav>

    <div id="logoutMenu">
        <button id="logoutBtn" class="logout-btn">Logout</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        const btn = document.getElementById('hamburger');
        const menu = document.getElementById('logoutMenu');
        const logoutBtn = document.getElementById('logoutBtn');

        // Toggle Menu
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        });

        // Logout Action
        logoutBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            // Lock UI to prevent flickering/re-entry
            document.body.style.opacity = "0.5";
            document.body.style.pointerEvents = "none";
            
            try {
                await supabase.auth.signOut();
            } catch (err) {
                console.error("Sign out error", err);
            }
            
            // Navigate away immediately
            window.location.replace("index.html");
        });

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (e.target !== btn) {
                menu.style.display = 'none';
            }
        });
    </script>
</body>
</html>
