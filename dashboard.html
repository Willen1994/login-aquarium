<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px 20px; align-items: center; }
        .menu-icon { font-size: 30px; cursor: pointer; padding: 10px; }
        
        #logoutMenu { 
            display: none; 
            position: absolute; 
            right: 20px; 
            top: 60px; 
            background: #fff; 
            color: #000; 
            padding: 15px 30px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            z-index: 9999; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3); 
            border: 2px solid red; /* Debugging: This red border will confirm it's visible */
        }
        .main-content { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <nav>
        <h2>My Dashboard</h2>
        <div class="menu-icon">
            <i class='bx bx-menu' onclick="toggleMenu(event)"></i>
        </div>
        <div id="logoutMenu" onclick="event.stopPropagation(); logout()">Logout</div>
    </nav>

    <div class="main-content">
        <h1>Welcome back, <span id="userName">Friend</span>!</h1>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        async function initDashboard() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = "index.html"; return; }
            const name = session.user.user_metadata.display_name || "Friend"; 
            document.getElementById('userName').innerText = name;
        }

        function toggleMenu(event) {
            event.stopPropagation(); 
            const menu = document.getElementById('logoutMenu');
            
            // Toggle logic: If it is currently hidden (none or empty), set to block
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'block';
            }
        }

        // Close menu if clicking anywhere else on the screen
        document.addEventListener('click', function() {
            const menu = document.getElementById('logoutMenu');
            menu.style.display = 'none';
        });

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }

        initDashboard();
    </script>
</body>
</html>
