<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        
        .menu-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid white; 
            border-radius: 5px;
            color: white; 
            font-size: 30px; 
            padding: 10px 15px; 
            cursor: pointer;
            z-index: 9999;
        }
        
        #logoutMenu { 
            display: none; 
            position: fixed; 
            right: 20px; 
            top: 80px; 
            background: #fff; 
            color: #000; 
            padding: 20px; 
            border-radius: 8px; 
            font-weight: 600; 
            z-index: 9999; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body>

    <nav>
        <h2>May Dashboard</h2>
        <button id="hamburger" class="menu-btn">
            <i class='bx bx-menu'></i>
        </button>
    </nav>

    <div id="logoutMenu">Logout</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        // Global handler to catch taps anywhere
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('logoutMenu');
            const hamburger = document.getElementById('hamburger');

            // If user clicked the button, toggle menu
            if (e.target.closest('#hamburger')) {
                menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
            } 
            // If user clicked the Logout button
            else if (e.target.id === 'logoutMenu') {
                supabase.auth.signOut().then(() => {
                    window.location.href = "index.html";
                });
            }
            // Otherwise, close the menu
            else {
                menu.style.display = 'none';
            }
        });
    </script>
</body>
</html>
