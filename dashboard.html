<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        
        .menu-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid white; 
            border-radius: 5px;
            color: white; 
            font-size: 30px; 
            padding: 10px 15px; 
            cursor: pointer;
            z-index: 999999;
            touch-action: manipulation;
        }
        
        #logoutMenu { 
            display: none; 
            position: fixed; 
            right: 20px; 
            top: 80px; 
            background: #fff; 
            color: #000; 
            padding: 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            z-index: 999999; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); 
        }
        #logoutMenu.show { display: block !important; }
    </style>
</head>
<body>

    <nav>
        <h2>My Dashboard</h2>
        <button id="hamburger" class="menu-btn">
            <i class='bx bx-menu'></i>
        </button>
    </nav>

    <div id="logoutMenu">Logout</div>

    <script>
        // Initialize Supabase globally
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('hamburger');
            const menu = document.getElementById('logoutMenu');

            // Toggle logic
            function toggleMenu(e) {
                e.preventDefault();
                e.stopPropagation();
                menu.classList.toggle('show');
            }

            btn.addEventListener('click', toggleMenu);
            btn.addEventListener('touchstart', toggleMenu);
            document.addEventListener('click', () => menu.classList.remove('show'));

            // Logout logic
            menu.addEventListener('click', async (e) => {
                e.stopPropagation();
                try {
                    await supabase.auth.signOut();
                    window.location.href = "index.html"; 
                } catch (err) {
                    alert("Logout failed: " + err.message);
                }
            });
        });
    </script>
</body>
</html>
