<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        
        /* The Checkbox Hack: This is invisible and controls the menu state */
        #nav-toggle { display: none; }
        
        /* When #nav-toggle is checked, find #logoutMenu and show it */
        #nav-toggle:checked ~ #logoutMenu { display: block; }

        .menu-btn { 
            background: transparent; border: none; color: white; 
            font-size: 35px; cursor: pointer; padding: 10px;
        }

        #logoutMenu { 
            display: none; position: fixed; right: 20px; top: 70px; 
            background: #fff; color: #000; border-radius: 8px; z-index: 999999;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); padding: 20px;
        }

        /* We use a span instead of a link to avoid browser 'navigation' interference */
        .logout-action { 
            color: #000; font-weight: 600; cursor: pointer; 
            display: block; font-size: 18px; padding: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <h2>May Dashboard</h2>
        <input type="checkbox" id="nav-toggle">
        <label for="nav-toggle" class="menu-btn"><i class='bx bx-menu'></i></label>
        
        <div id="logoutMenu">
            <span id="logoutLink" class="logout-action">Logout</span>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        // Logout logic is the only thing left in JS
        document.getElementById('logoutLink').onclick = async () => {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        };
    </script>
</body>
</html>
