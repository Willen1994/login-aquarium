<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        
        .menu-btn { background: transparent; border: none; color: white; font-size: 35px; cursor: pointer; }
        
        /* Dropdown styling */
        #logoutMenu { 
            display: none; position: fixed; right: 20px; top: 70px; 
            background: #fff; color: #000; border-radius: 8px; z-index: 999999;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); padding: 10px;
        }

        /* Make Logout look like a button, not text */
        .logout-btn { 
            background: #f0f0f0; border: 1px solid #ccc; padding: 10px 20px;
            border-radius: 5px; font-weight: 600; cursor: pointer; color: black;
            font-family: 'Poppins', sans-serif; width: 100%;
        }
    </style>
</head>
<body>

    <nav>
        <h2>May Dashboard</h2>
        <button id="hamburger" class="menu-btn"><i class='bx bx-menu'></i></button>
    </nav>

    <div id="logoutMenu">
        <button id="logoutAction" class="logout-btn">Logout</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        const btn = document.getElementById('hamburger');
        const menu = document.getElementById('logoutMenu');
        const logoutBtn = document.getElementById('logoutAction');

        // Toggle Menu
        btn.onclick = (e) => {
            e.stopPropagation();
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        };

        // Logout Action
        logoutBtn.onclick = async (e) => {
            e.preventDefault(); // CRITICAL: Stop browser from doing anything else
            e.stopPropagation();
            await supabase.auth.signOut();
            window.location.href = "index.html";
        };

        // Close when clicking background
        document.onclick = () => { menu.style.display = 'none'; };
    </script>
</body>
</html>
