<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        
        .menu-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid white; 
            border-radius: 5px;
            color: white; 
            font-size: 30px; 
            padding: 10px 15px; 
            cursor: pointer;
            /* Force this button to be on top of absolutely everything */
            position: relative;
            z-index: 999999;
        }
        
        #logoutMenu { 
            display: none; 
            position: fixed; /* Fixed to the viewport */
            right: 20px; 
            top: 80px; 
            background: #fff; 
            color: #000; 
            padding: 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            z-index: 999999; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); 
        }
        #logoutMenu.show { display: block !important; }
    </style>
</head>
<body>

    <nav>
        <h2>My Dashboard</h2>
        <button id="hamburger" class="menu-btn">
            <i class='bx bx-menu'></i>
        </button>
    </nav>

    <div id="logoutMenu">Logout</div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        const btn = document.getElementById('hamburger');
        const menu = document.getElementById('logoutMenu');

        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            menu.classList.toggle('show');
        });

        document.addEventListener('click', function() {
            menu.classList.remove('show');
        });

        menu.addEventListener('click', async function() {
            await supabase.auth.signOut();
            window.location.href = "index.html"; 
        });
    </script>
</body>
</html>
