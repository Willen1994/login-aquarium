<!DOCTYPE html>
<html>
<body>
    <h1>Welcome, <span id="userName"></span>!</h1>
    <button id="logoutBtn">Logout</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

        async function initDashboard() {
            const { data: { session } } = await supabase.auth.getSession();
            
            // SECURITY: If no session, kick them back to login!
            if (!session) {
                window.location.href = "index.html";
                return;
            }
            
            // Welcome the user by name
            document.getElementById('userName').innerText = session.user.user_metadata.display_name;
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = "index.html"; // Send them back to login
        });

        initDashboard();
    </script>
</body>
</html>
