<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 20px 50px; align-items: center; }
        .menu-icon { font-size: 30px; cursor: pointer; position: relative; }
        
        /* Dropdown - Added z-index to ensure it sits on top */
        #logoutMenu { display: none; position: absolute; right: 50px; top: 70px; background: #fff; color: #000; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; z-index: 1000; }
        #logoutMenu:hover { background: #f0f0f0; }
        
        .main-content { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <nav>
        <h2>My Dashboard</h2>
        <div class="menu-icon" onclick="toggleMenu()">
            <i class='bx bx-menu'></i>
        </div>
        <div id="logoutMenu" onclick="logout()">Logout</div>
    </nav>

    <div class="main-content">
        <h1>Welcome back, <span id="userName">Friend</span>!</h1>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Debugging Tool: Alert if any code fails
        window.onerror = function(message, source, lineno, colno, error) {
           alert("Code Error: " + message + " at line " + lineno);
        };

        // 1. Correct Initialization
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'YOUR_SUPABASE_ANON_KEY' // Remember to replace this with your actual public key
        );

        async function initDashboard() {
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                window.location.href = "index.html";
                return;
            }

            const userMetadata = session.user.user_metadata;
            const name = userMetadata.display_name || "Friend"; 
            
            document.getElementById('userName').innerText = name;
        }

        // 2. Updated toggle function
        function toggleMenu() {
            const menu = document.getElementById('logoutMenu');
            if (menu.style.display === 'block') {
                menu.style.display = 'none';
            } else {
                menu.style.display = 'block';
            }
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }

        // --- 10 Minute Inactivity Timer ---
        let timeout;
        function resetTimer() {
            clearTimeout(timeout);
            timeout = setTimeout(logout, 600000); // 10 minutes
        }
        
        window.onload = window.onmousemove = window.onkeypress = resetTimer;

        // Initialize on load
        initDashboard();
        resetTimer(); 
    </script>
</body>
</html>
