<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 20px 50px; align-items: center; }
        .menu-icon { font-size: 30px; cursor: pointer; position: relative; }
        
        /* Dropdown */
        #logoutMenu { display: none; position: absolute; right: 50px; top: 70px; background: #fff; color: #000; padding: 10px; border-radius: 8px; cursor: pointer; }
        
        .main-content { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <nav>
        <h2>My Dashboard</h2>
        <div class="menu-icon" onclick="toggleMenu()">
            <i class='bx bx-menu'></i>
        </div>
        <div id="logoutMenu" onclick="logout()">Logout</div>
    </nav>

    <div class="main-content">
        <h1>Welcome back, <span id="userName">Friend</span>!</h1>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient('https://irbjtcwwcrrqlfjqzdku.supabase.co', 'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg);

        async function initDashboard() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) { window.location.href = "index.html"; return; }
            
            // Retrieve the display_name you saved during Signup
            const name = session.user.user_metadata.display_name || "Friend";
            document.getElementById('userName').innerText = name;
        }

        function toggleMenu() {
            const menu = document.getElementById('logoutMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        async function logout() {
            await supabase.auth.signOut();
            window.location.href = "index.html";
        }

        // --- 10 Minute Inactivity Timer ---
        let timeout;
        function resetTimer() {
            clearTimeout(timeout);
            timeout = setTimeout(logout, 600000); // 600,000ms = 10 minutes
        }
        window.onload = window.onmousemove = window.onkeypress = resetTimer;

        initDashboard();
    </script>
</body>
</html>
