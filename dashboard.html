<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        
        .menu-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid white; border-radius: 5px;
            color: white; font-size: 30px; padding: 10px 15px; cursor: pointer;
        }

        #logoutMenu { 
            display: none; position: fixed; right: 20px; top: 80px; 
            background: #fff; color: #000; border-radius: 8px; z-index: 9999;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); padding: 15px 25px;
        }

        /* The standard link style */
        .logout-link { 
            color: #000; text-decoration: none; font-weight: 600; 
            display: block; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <h2>May Dashboard</h2>
        <button id="hamburger" class="menu-btn"><i class='bx bx-menu'></i></button>
        <div id="logoutMenu">
            <a id="logoutLink" class="logout-link">Logout</a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        const btn = document.getElementById('hamburger');
        const menu = document.getElementById('logoutMenu');
        const link = document.getElementById('logoutLink');

        // Toggle menu
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        });

        // Logout via simple link
        link.addEventListener('click', async (e) => {
            e.preventDefault(); // Prevents link default behavior
            await supabase.auth.signOut();
            window.location.href = "index.html";
        });

        // Close when clicking anywhere else
        document.addEventListener('click', () => menu.style.display = 'none');
    </script>
</body>
</html>
