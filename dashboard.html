<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; position: relative; }
        
        /* Large, touch-friendly area */
        .menu-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid white; 
            border-radius: 5px;
            color: white; 
            font-size: 30px; 
            padding: 10px 15px; 
            cursor: pointer; 
            z-index: 9999;
        }
        
        #logoutMenu { 
            display: none; 
            position: absolute; 
            right: 20px; 
            top: 70px; 
            background: #fff; 
            color: #000; 
            padding: 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            z-index: 9999; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); 
            border: 2px solid blue; /* Debugging border */
        }
    </style>
</head>
<body>

    <nav>
        <h2>My Dashboard</h2>
        <button id="hamburger" class="menu-btn">
            <i class='bx bx-menu'></i>
        </button>
        <div id="logoutMenu">Logout</div>
    </nav>

    <script>
        const btn = document.getElementById('hamburger');
        const menu = document.getElementById('logoutMenu');

        // Use 'touchstart' for mobile, 'click' for desktop
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        });

        // Logout action
        menu.addEventListener('click', function() {
            window.location.href = "index.html"; // Simulate logout for now
        });
    </script>
</body>
</html>
