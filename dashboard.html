<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        
        #menu-toggle { display: none; }

        .menu-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid white; 
            border-radius: 5px;
            color: white; 
            font-size: 30px; 
            padding: 10px 15px; 
            cursor: pointer;
            display: block;
        }

        #menu-toggle:checked ~ #logoutMenu { display: block; }
        
        #logoutMenu { 
            display: none; 
            position: fixed; 
            right: 20px; 
            top: 80px; 
            background: #fff; 
            padding: 0; /* Remove padding here */
            border-radius: 8px; 
            z-index: 999999; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); 
        }

        #logoutBtn {
            background: none; 
            border: none; 
            color: black; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px; 
            padding: 20px 40px; /* BIG clickable area */
            width: 100%;
            font-family: 'Poppins', sans-serif;
            display: block;
        }
    </style>
</head>
<body>

    <nav>
        <h2>My Dashboard</h2>
        <input type="checkbox" id="menu-toggle">
        <label for="menu-toggle" class="menu-btn">
            <i class='bx bx-menu'></i>
        </label>
        
        <div id="logoutMenu">
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        // We use a small delay to ensure the event is captured
        document.getElementById('logoutBtn').addEventListener('touchstart', async (e) => {
            e.preventDefault(); 
            e.stopPropagation();
            await supabase.auth.signOut();
            window.location.href = "index.html"; 
        });

        // Backup click listener
        document.getElementById('logoutBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            await supabase.auth.signOut();
            window.location.href = "index.html"; 
        });
    </script>
</body>
</html>
