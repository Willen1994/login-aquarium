<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; visibility: hidden; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .menu-btn { background: transparent; border: none; color: white; font-size: 35px; cursor: pointer; padding: 5px; }
        #logoutMenu { display: none; position: fixed; right: 20px; top: 70px; background: #fff; color: #000; border-radius: 8px; z-index: 999999; box-shadow: 0px 4px 10px rgba(0,0,0,0.5); padding: 20px; }
        #logoutLink { color: #000; text-decoration: none; font-weight: 600; cursor: pointer; display: block; font-size: 18px; }
    </style>
</head>
<body>

    <nav>
        <h2>May Dashboard</h2>
        <button id="hamburger" class="menu-btn"><i class='bx bx-menu'></i></button>
    </nav>

    <div id="logoutMenu">
        <a id="logoutLink">Logout</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        // Security: Check for session before showing anything
        async function init() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
            } else {
                document.body.style.visibility = 'visible';
            }
        }
        init();

        const btn = document.getElementById('hamburger');
        const menu = document.getElementById('logoutMenu');
        const link = document.getElementById('logoutLink');

        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        });

        link.addEventListener('click', async (e) => {
            e.stopPropagation();
            await supabase.auth.signOut();
            window.location.href = "index.html";
        });

        document.addEventListener('click', () => { menu.style.display = 'none'; });
    </script>
</body>
</html>
