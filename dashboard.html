<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body { background: #030812; color: #fff; font-family: 'Poppins', sans-serif; margin: 0; }
        nav { display: flex; justify-content: space-between; padding: 20px; align-items: center; position: relative; }
        
        .menu-btn { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid white; 
            border-radius: 5px;
            color: white; 
            font-size: 30px; 
            padding: 10px 15px; 
            cursor: pointer; 
            z-index: 9999;
        }
        
        #logoutMenu { 
            display: none; 
            position: absolute; 
            right: 20px; 
            top: 70px; 
            background: #fff; 
            color: #000; 
            padding: 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            z-index: 9999; 
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); 
        }
    </style>
</head>
<body>

    <nav>
        <h2>My Dashboard</h2>
        <button id="hamburger" class="menu-btn">
            <i class='bx bx-menu'></i>
        </button>
        <div id="logoutMenu">Logout</div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://irbjtcwwcrrqlfjqzdku.supabase.co', 
            'sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg' 
        );

        const btn = document.getElementById('hamburger');
        const menu = document.getElementById('logoutMenu');

        // Toggle Menu
        btn.addEventListener('click', function(e) {
            e.stopPropagation();
            menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
        });

        // Close menu when clicking elsewhere
        document.addEventListener('click', function() {
            menu.style.display = 'none';
        });

        // Perform actual Supabase sign-out
        menu.addEventListener('click', async function() {
            await supabase.auth.signOut();
            window.location.href = "index.html"; 
        });

        // Initial session check
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                window.location.href = "index.html";
            }
        }
        
        checkSession();
    </script>
</body>
</html>
