<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #030812; background-image: radial-gradient(at 0% 0%, hsla(215, 95%, 15%, 1) 0px, transparent 50%), radial-gradient(at 100% 100%, hsla(220, 100%, 10%, 1) 0px, transparent 50%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; overflow: hidden; }
        /* ... (Keep all your original CSS here exactly as you have it) ... */
        /* Note: Paste your full original CSS between these style tags */
    </style>
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- FIXED AUTH LOGIC ---
        const SUPABASE_URL = "https://irbjtcwwcrrqlfjqzdku.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__5BvzDgX4ZMocqE7zzTUSw_ITRUdcc0";

        // IMPORTANT: persistSession must be TRUE so the dashboard knows you are logged in
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true }
        });

        // Login Form Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;

            try {
                const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) throw error;
                // Redirect to dashboard immediately after success
                window.location.href = 'dashboard.html'; 
            } catch (err) {
                alert("Login Error: " + err.message);
            }
        });

        // Sign Up Form Handler
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signUp({
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPass').value,
                options: { data: { display_name: document.getElementById('signupUser').value } }
            });
            if (error) alert("Signup Error: " + error.message);
            else { alert("Sign up successful!"); document.getElementById('container').classList.remove('active'); }
        });

        // --- KEEP ALL YOUR ORIGINAL AQUARIUM ANIMATION SCRIPTS BELOW THIS LINE ---
    </script>
</body>
</html>
