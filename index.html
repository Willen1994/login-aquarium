<!DOCTYPE html>
<html>
<head>
    <title>Aquarium Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <p>Loading... If it takes too long, <a href="auth.html">click here to enter.</a></p>

    <script>
        const SUPABASE_URL = "https://irbjtcwwcrrqlfjqzdku.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__5BvzDgX4ZMocqE7zzTUSw_ITRUdcc0";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function checkAuth() {
            try {
                // If the script hangs, this timer forces a redirect after 3 seconds
                const timer = setTimeout(() => { window.location.href = 'auth.html'; }, 3000);

                const { data: { session } } = await supabase.auth.getSession();
                clearTimeout(timer); // Stop the timer if Supabase responds

                if (session) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'auth.html';
                }
            } catch (err) {
                window.location.href = 'auth.html';
            }
        }
        checkAuth();
    </script>
</body>
</html>
