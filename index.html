<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | My App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: radial-gradient(circle at 50% 50%, #050e1a 0%, #030812 100%); color: white; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div id="content" class="max-w-md w-full glass-card p-8 rounded-3xl text-center shadow-2xl transition-all duration-500 opacity-0 transform translate-y-4">
        <div class="w-20 h-20 bg-blue-500 rounded-full mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-500/50">
            <span id="initial" class="text-3xl font-bold">U</span>
        </div>
        <h1 class="text-3xl font-bold mb-2">Welcome Back!</h1>
        <p id="user-email" class="text-blue-400 mb-8"></p>
        
        <button id="logout-btn" class="w-full py-3 bg-transparent border border-gray-600 hover:bg-white hover:text-black transition-all rounded-full font-semibold">
            Logout
        </button>
    </div>

    <script>
        const SUPABASE_URL = "https://irbjtcwwcrrqlfjqzdku.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__5BvzDgX4ZMocqE7zzTUSw_ITRUdcc0";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initDashboard() {
            const { data: { user } } = await supabase.auth.getUser();
            
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            // Display Info
            const name = user.user_metadata.display_name || user.email;
            document.getElementById('user-email').innerText = user.email;
            document.getElementById('initial').innerText = name.charAt(0).toUpperCase();

            // Reveal animation
            const content = document.getElementById('content');
            content.classList.remove('opacity-0', 'translate-y-4');
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = 'auth.html';
        });

        initDashboard();
    </script>
</body>
</html>
