<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #030812; background-image: radial-gradient(at 0% 0%, hsla(215, 95%, 15%, 1) 0px, transparent 50%), radial-gradient(at 100% 100%, hsla(220, 100%, 10%, 1) 0px, transparent 50%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; overflow: hidden; }
        .bg-glow { position: absolute; width: 450px; height: 450px; background: radial-gradient(circle, rgba(0, 255, 204, 0.18) 0%, rgba(0, 150, 255, 0) 70%); bottom: 10%; right: 15%; z-index: 0; pointer-events: none; filter: blur(30px); }
        .glass-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 950px; height: 600px; max-width: 96vw; max-height: 92vh; background: rgba(255, 255, 255, 0.03); border-radius: 32px; backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5); z-index: 1; pointer-events: none; }
        .container { background-color: #ffffff; border-radius: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); position: relative; overflow: hidden; width: 850px; max-width: 100%; min-height: 500px; display: flex; z-index: 2; }
        .forms-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .form-box { position: absolute; top: 0; width: 50%; height: 100%; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; }
        .login-box { left: 0; opacity: 1; z-index: 5; }
        .container.active .login-box { opacity: 0; pointer-events: none; transform: translateX(-20px); }
        .signup-box { right: 0; opacity: 0; transform: translateX(20px); }
        .container.active .signup-box { opacity: 1; z-index: 5; transform: translateX(0); }
        form { width: 100%; padding: 0 50px; display: flex; flex-direction: column; }
        h2 { font-size: 36px; font-weight: 700; margin-bottom: 8px; color: #000; text-align: center; }
        h2::after { content: ''; display: block; width: 30px; height: 3px; background-color: #000; margin: 8px auto 20px auto; }
        .input-box { position: relative; width: 100%; margin: 15px 0; border-bottom: 2px solid #ccc; }
        .input-box input { width: 100%; padding: 10px 5px; background: transparent; border: none; outline: none; font-size: 14px; }
        .btn { background-color: #000; color: #fff; padding: 12px; width: 100%; border: none; border-radius: 25px; font-weight: 600; cursor: pointer; margin-top: 25px; }
        .switch-text { font-size: 13px; color: #333; margin-top: 25px; text-align: center; }
        .switch-text a { color: #000; font-weight: 700; text-decoration: none; }
        .aquarium-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 11; transition: opacity 0.6s ease-in-out; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="glass-frame"></div>
    <div class="container" id="container">
        <canvas class="aquarium-canvas front-aquarium"></canvas>
        <canvas class="aquarium-canvas back-aquarium"></canvas>
        <div class="forms-container">
            <div class="form-box login-box">
                <form id="loginForm">
                    <h2>Login</h2>
                    <div class="input-box"><input type="email" id="loginEmail" required placeholder="Email"></div>
                    <div class="input-box"><input type="password" id="loginPass" required placeholder="Password"></div>
                    <button type="submit" class="btn">Login</button>
                    <p class="switch-text">Don't have an account? <a href="#" id="to-signup">Sign Up</a></p>
                </form>
            </div>
            <div class="form-box signup-box">
                <form id="signupForm">
                    <h2>Sign Up</h2>
                    <div class="input-box"><input type="text" id="signupUser" required placeholder="Username"></div>
                    <div class="input-box"><input type="email" id="signupEmail" required placeholder="Email"></div>
                    <div class="input-box"><input type="password" id="signupPass" required placeholder="Password"></div>
                    <button type="submit" class="btn">Sign Up</button>
                    <p class="switch-text">Already have an account? <a href="#" id="to-login">Login</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseClient = supabase.createClient(
            "https://irbjtcwwcrrqlfjqzdku.supabase.co", 
            "sb_publishable_lh0fpbTi1qweqBZXUlztUQ_bRzWkAeg"
        );

        // --- AUTH LOGIC (No-Loop Redirect) ---
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                window.location.replace("dashboard.html");
            }
        });

        // --- UI & AQUARIUM LOGIC ---
        const container = document.getElementById('container');
        document.getElementById('to-signup').addEventListener('click', (e) => { e.preventDefault(); container.classList.add('active'); });
        document.getElementById('to-login').addEventListener('click', (e) => { e.preventDefault(); container.classList.remove('active'); });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signUp({
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPass').value
            });
            if (error) alert(error.message); else alert("Check your email!");
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPass').value
            });
            if (error) alert("Login failed: " + error.message);
        });
        
        // (Note: Keep your existing Fish/Bubble classes here to maintain the visual effect)
    </script>
</body>
</html>
