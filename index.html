<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        /* YOUR ORIGINAL CSS PRESERVED EXACTLY */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #030812; background-image: radial-gradient(at 0% 0%, hsla(215, 95%, 15%, 1) 0px, transparent 50%), radial-gradient(at 100% 100%, hsla(220, 100%, 10%, 1) 0px, transparent 50%); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; position: relative; overflow: hidden; }
        .bg-glow { position: absolute; width: 450px; height: 450px; background: radial-gradient(circle, rgba(0, 255, 204, 0.18) 0%, rgba(0, 150, 255, 0) 70%); bottom: 10%; right: 15%; z-index: 0; pointer-events: none; filter: blur(30px); }
        .glass-frame { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 950px; height: 600px; max-width: 96vw; max-height: 92vh; background: rgba(255, 255, 255, 0.03); border-radius: 32px; backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.12); box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(0, 140, 255, 0.1); z-index: 1; pointer-events: none; }
        .container { background-color: #ffffff; border-radius: 20px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); position: relative; overflow: hidden; width: 850px; max-width: 100%; min-height: 500px; display: flex; z-index: 2; }
        .flip-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; filter: url(#water-shake); will-change: filter; }
        .flip-card { width: 100%; height: 100%; position: relative; transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center center; }
        .container.active .flip-card { transform: rotate(-180deg); }
        .card-side { position: absolute; width: 100%; height: 100%; }
        .front-side { background: transparent; z-index: 2; }
        .front-side .overlay-panel { background-color: #050e1a; clip-path: polygon(45% 0, 100% 0, 100% 100%, 80% 100%); }
        .back-side { background: transparent; transform: rotate(180deg); }
        .back-side .overlay-panel { background-color: #050e1a; clip-path: polygon(0 0, 20% 0, 55% 100%, 0 100%); }
        .overlay-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; color: #fff; pointer-events: auto; cursor: pointer; }
        .overlay-content { position: absolute; top: 0; width: 45%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 40px; text-align: center; z-index: 2; }
        .right-content { right: 0; } .left-content { left: 0; }
        .overlay-content h1 { font-size: 32px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 15px; line-height: 1.2; }
        .overlay-content p { font-size: 13px; color: #a0aec0; line-height: 1.6; }
        .forms-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .form-box { position: absolute; top: 0; width: 50%; height: 100%; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; }
        .login-box { left: 0; opacity: 1; z-index: 5; }
        .container.active .login-box { opacity: 0; pointer-events: none; transform: translateX(-20px); }
        .signup-box { right: 0; opacity: 0; transform: translateX(20px); }
        .container.active .signup-box { opacity: 1; z-index: 5; transform: translateX(0); }
        form { width: 100%; padding: 0 50px; display: flex; flex-direction: column; }
        h2 { font-size: 36px; font-weight: 700; margin-bottom: 8px; color: #000; text-align: center; }
        h2::after { content: ''; display: block; width: 30px; height: 3px; background-color: #000; margin: 8px auto 20px auto; }
        .input-box { position: relative; width: 100%; margin: 15px 0; border-bottom: 2px solid #ccc; transition: border-color 0.3s ease; }
        .input-box:focus-within { border-color: #000; }
        .input-box input { width: 100%; padding: 10px 30px 10px 5px; background: transparent; border: none; outline: none; font-size: 14px; color: #333; }
        .input-box i { position: absolute; right: 5px; bottom: 12px; font-size: 16px; color: #555; }
        .btn { background-color: #000; color: #fff; font-size: 15px; padding: 12px 0; width: 100%; border: none; border-radius: 25px; font-weight: 600; margin-top: 25px; cursor: pointer; transition: background 0.2s ease; }
        .btn:hover { background-color: #222; }
        .switch-text { font-size: 13px; color: #333; margin-top: 25px; text-align: center; }
        .switch-text a { color: #000; font-weight: 700; text-decoration: none; margin-left: 3px; }
        .switch-text a:hover { text-decoration: underline; }
        .aquarium-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 11; transition: opacity 0.6s ease-in-out; }
        .front-aquarium { clip-path: polygon(45% 0, 100% 0, 100% 100%, 80% 100%); opacity: 1; }
        .container.active .front-aquarium { opacity: 0; }
        .back-aquarium { clip-path: polygon(0 0, 20% 0, 55% 100%, 0 100%); opacity: 0; }
        .container.active .back-aquarium { opacity: 1; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="glass-frame"></div>
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <filter id="water-shake">
                <feTurbulence type="fractalNoise" baseFrequency="0 0" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="displacement" />
            </filter>
        </defs>
    </svg>
    <div class="container" id="container">
        <canvas class="aquarium-canvas front-aquarium"></canvas>
        <canvas class="aquarium-canvas back-aquarium"></canvas>
        <div class="flip-wrapper">
            <div class="flip-card">
                <div class="card-side front-side"><div class="overlay-panel" id="front-overlay"><div class="overlay-content right-content"></div></div></div>
                <div class="card-side back-side"><div class="overlay-panel" id="back-overlay"><div class="overlay-content left-content"><h1>HELLO, FRIEND!</h1><p>Enter your personal details and start your journey with us today.</p></div></div></div>
            </div>
        </div>
        <div class="forms-container">
            <div class="form-box login-box">
                <form id="loginForm">
                    <h2>Login</h2>
                    <div class="input-box"><input type="email" id="loginEmail" required placeholder="Email"><i class='bx bxs-envelope'></i></div>
                    <div class="input-box"><input type="password" id="loginPass" required placeholder="Password"><i class='bx bxs-lock-alt'></i></div>
                    <button type="submit" class="btn">Login</button>
                    <p class="switch-text">Don't have an account? <a href="#" id="to-signup">Sign Up</a></p>
                </form>
            </div>
            <div class="form-box signup-box">
                <form id="signupForm">
                    <h2>Sign Up</h2>
                    <div class="input-box"><input type="text" id="signupUser" required placeholder="Username"><i class='bx bxs-user'></i></div>
                    <div class="input-box"><input type="email" id="signupEmail" required placeholder="Email"><i class='bx bxs-envelope'></i></div>
                    <div class="input-box"><input type="password" id="signupPass" required placeholder="Password"><i class='bx bxs-lock-alt'></i></div>
                    <button type="submit" class="btn">Sign Up</button>
                    <p class="switch-text">Already have an account? <a href="#" id="to-login">Login</a></p>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // --- FIXED AUTH LOGIC ---
        const SUPABASE_URL = "https://irbjtcwwcrrqlfjqzdku.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable__5BvzDgX4ZMocqE7zzTUSw_ITRUdcc0";
        // FIX: persistSession: true ensures the user stays logged in across pages
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true }
        });

        // --- ANIMATION LOGIC (UNCHANGED) ---
        const container = document.getElementById('container');
        const turbulence = document.querySelector('feTurbulence');
        const displacement = document.getElementById('displacement');
        let animationFrameId = null;

        function triggerWaterShake() {
            let start = null; const duration = 900;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            function animate(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let intensity = Math.sin((progress / duration) * Math.PI); 
                if(turbulence) turbulence.setAttribute('baseFrequency', `${intensity * 0.04} ${intensity * 0.02}`);
                if(displacement) displacement.setAttribute('scale', intensity * 75);
                if (progress < duration) animationFrameId = requestAnimationFrame(animate);
                else { if(turbulence) turbulence.setAttribute('baseFrequency', '0 0'); if(displacement) displacement.setAttribute('scale', '0'); }
            }
            animationFrameId = requestAnimationFrame(animate);
        }

        function switchToSignUp() { container.classList.add('active'); triggerWaterShake(); }
        function switchToLogin() { container.classList.remove('active'); triggerWaterShake(); }
        document.getElementById('to-signup').addEventListener('click', (e) => { e.preventDefault(); switchToSignUp(); });
        document.getElementById('to-login').addEventListener('click', (e) => { e.preventDefault(); switchToLogin(); });
        document.getElementById('front-overlay').addEventListener('click', switchToSignUp);
        document.getElementById('back-overlay').addEventListener('click', switchToLogin);

        // --- AUTH SUBMISSIONS (FIXED REDIRECT) ---
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPass').value
            });
            if (error) alert(error.message);
            else window.location.href = 'dashboard.html';
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signUp({
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPass').value,
                options: { data: { display_name: document.getElementById('signupUser').value } }
            });
            if (error) alert(error.message);
            else { alert("Sign up successful!"); switchToLogin(); }
        });

        // --- AQUARIUM CLASSES (UNCHANGED) ---
        const canvases = document.querySelectorAll('.aquarium-canvas');
        const aquariumSystems = [];
        class GlowingFish { constructor(w, h) { this.x = Math.random()*w; this.y = Math.random()*h; this.speedX = (Math.random()-0.5)*1.5; this.color = ['#00ffcc', '#ff007f', '#39ff14'][Math.floor(Math.random()*3)]; } update() { this.x += this.speedX; if(this.x < -50 || this.x > 1000) this.speedX *= -1; } draw(ctx) { ctx.fillStyle=this.color; ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill(); } }
        function initAquarium() { aquariumSystems.length = 0; canvases.forEach(c => { aquariumSystems.push({ctx: c.getContext('2d'), fish: [new GlowingFish(c.width, c.height)]}); }); }
        function playAquarium() { requestAnimationFrame(playAquarium); aquariumSystems.forEach(s => { s.ctx.clearRect(0,0,1000,600); s.fish.forEach(f => {f.update(); f.draw(s.ctx);}); }); }
        initAquarium(); playAquarium();
    </script>
</body>
</html>
