<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: #030812; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { background-color: #ffffff; border-radius: 20px; width: 850px; max-width: 100%; min-height: 500px; display: flex; position: relative; z-index: 2; overflow: hidden; }
        .form-box { width: 50%; display: flex; align-items: center; justify-content: center; transition: opacity 0.4s; }
        .login-box { left: 0; }
        .signup-box { right: 0; opacity: 0; }
        .container.active .login-box { opacity: 0; pointer-events: none; }
        .container.active .signup-box { opacity: 1; }
        form { width: 100%; padding: 0 50px; display: flex; flex-direction: column; }
        .input-box { position: relative; width: 100%; margin: 15px 0; border-bottom: 2px solid #ccc; }
        .input-box input { width: 100%; padding: 10px 5px; border: none; outline: none; }
        .btn { background-color: #000; color: #fff; padding: 12px; width: 100%; border-radius: 25px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div class="container" id="container">
        <div class="form-box login-box">
            <form id="loginForm">
                <h2>Login</h2>
                <div class="input-box"><input type="email" id="loginEmail" required placeholder="Email"></div>
                <div class="input-box"><input type="password" id="loginPass" required placeholder="Password"></div>
                <button type="submit" class="btn">Login</button>
                <p>Don't have an account? <a href="#" id="to-signup">Sign Up</a></p>
            </form>
        </div>

        <div class="form-box signup-box">
            <form id="signupForm">
                <h2>Sign Up</h2>
                <div class="input-box"><input type="text" id="signupUser" required placeholder="Username"></div>
                <div class="input-box"><input type="email" id="signupEmail" required placeholder="Email"></div>
                <div class="input-box"><input type="password" id="signupPass" required placeholder="Password"></div>
                <button type="submit" class="btn">Sign Up</button>
                <p>Already have an account? <a href="#" id="to-login">Login</a></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://irbjtcwwcrqlfjqzdbku.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyYmp0Y3d3Y3JycWxmanF6ZGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzY4MjMsImV4cCI6MjA5NjM1MjgyM30.thQuxp8kl6HTUnP-HcwlKnem4FYcym_LNq_UM_yzF5Y";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { persistSession: true, autoRefreshToken: true }
        });

        const container = document.getElementById('container');
        document.getElementById('to-signup').addEventListener('click', (e) => { e.preventDefault(); container.classList.add('active'); });
        document.getElementById('to-login').addEventListener('click', (e) => { e.preventDefault(); container.classList.remove('active'); });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signUp({
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPass').value
            });
            if (error) alert("Sign Up Error: " + error.message);
            else alert("Check your email to confirm!");
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPass').value
            });
            if (error) alert("Login Error: " + error.message);
            else alert("Login successful!");
        });
    </script>
</body>
</html>
