<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* --- DEEP, RICH BLUE SPACE BACKGROUND --- */
        body {
            background-color: #030812;
            background-image: 
                radial-gradient(at 0% 0%, hsla(215, 95%, 15%, 1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(220, 100%, 10%, 1) 0px, transparent 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* --- ORBITING NEON GLOW BLOB 1 --- */
        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 150, 255, 0.25) 0%, rgba(0, 70, 250, 0) 70%);
            top: 15%;
            left: 20%;
            z-index: 0;
            pointer-events: none;
            filter: blur(40px);
        }

        /* --- ORBITING NEON GLOW BLOB 2 --- */
        .bg-glow {
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.18) 0%, rgba(0, 150, 255, 0) 70%);
            bottom: 10%;
            right: 15%;
            z-index: 0;
            pointer-events: none;
            filter: blur(30px);
        }

        /* --- STUNNING FROSTED BLUE GLASS FRAME --- */
        .glass-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 950px; 
            height: 600px;
            max-width: 96vw;
            max-height: 92vh;
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 32px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 
                0 30px 70px rgba(0, 0, 0, 0.5),
                inset 0 0 30px rgba(0, 140, 255, 0.1);
            z-index: 1;
            pointer-events: none;
        }

        /* --- CONTAINER OVERLAYS THE GLASS PERFECTLY --- */
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            width: 850px;
            max-width: 100%;
            min-height: 500px;
            display: flex;
            z-index: 2;
        }

        /* --- ROTATION ENGINE WITH WATER SHAKE FILTER --- */
        .flip-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            filter: url(#water-shake);
            will-change: filter;
        }

        .overlay-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #fff;
            pointer-events: auto;
            cursor: pointer;
        }

        .flip-card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center center;
        }

        .container.active .flip-card {
            transform: rotate(-180deg);
        }

        .card-side {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .front-side {
            background: transparent;
            z-index: 2;
        }

        .front-side .overlay-panel {
            background-color: #050e1a;
            clip-path: polygon(45% 0, 100% 0, 100% 100%, 80% 100%);
        }

        .back-side {
            background: transparent;
            transform: rotate(180deg); 
        }

        .back-side .overlay-panel {
            background-color: #050e1a;
            clip-path: polygon(0 0, 20% 0, 55% 100%, 0 100%);
        }

        .overlay-content {
            position: absolute;
            top: 0;
            width: 45%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 40px;
            text-align: center;
            z-index: 2;
        }

        .right-content { right: 0; }
        .left-content { left: 0; }

        .overlay-content h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .overlay-content p {
            font-size: 13px;
            color: #a0aec0;
            line-height: 1.6;
        }

        /* --- FORM BOX POSITIONING AND DESIGN --- */
        .forms-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .form-box {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
        }

        .login-box {
            left: 0;
            opacity: 1;
            z-index: 5;
        }

        .container.active .login-box {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-20px);
        }

        .signup-box {
            right: 0;
            opacity: 0;
            transform: translateX(20px);
        }

        .container.active .signup-box {
            opacity: 1;
            z-index: 5;
            transform: translateX(0);
        }

        form {
            width: 100%;
            padding: 0 50px;
            display: flex;
            flex-direction: column;
        }

        h2 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #000;
            text-align: center;
        }

        h2::after {
            content: '';
            display: block;
            width: 30px;
            height: 3px;
            background-color: #000;
            margin: 8px auto 20px auto;
        }

        .input-box {
            position: relative;
            width: 100%;
            margin: 15px 0;
            border-bottom: 2px solid #ccc;
            transition: border-color 0.3s ease;
        }

        .input-box:focus-within {
            border-color: #000;
        }

        .input-box input {
            width: 100%;
            padding: 10px 30px 10px 5px;
            background: transparent;
            border: none;
            outline: none;
            font-size: 14px;
            color: #333;
        }

        .input-box i {
            position: absolute;
            right: 5px;
            bottom: 12px;
            font-size: 16px;
            color: #555;
        }

        .btn {
            background-color: #000;
            color: #fff;
            font-size: 15px;
            padding: 12px 0;
            width: 100%;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            margin-top: 25px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .btn:hover { background-color: #222; }

        .switch-text {
            font-size: 13px;
            color: #333;
            margin-top: 25px;
            text-align: center;
        }

        .switch-text a {
            color: #000;
            font-weight: 700;
            text-decoration: none;
            margin-left: 3px;
        }

        .switch-text a:hover { text-decoration: underline; }

        /* --- FIXED AQUARIUM LAYER CSS --- */
        .aquarium-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 11; 
            transition: opacity 0.6s ease-in-out;
        }

        .front-aquarium {
            clip-path: polygon(45% 0, 100% 0, 100% 100%, 80% 100%);
            opacity: 1;
        }
        .container.active .front-aquarium { opacity: 0; }

        .back-aquarium {
            clip-path: polygon(0 0, 20% 0, 55% 100%, 0 100%);
            opacity: 0;
        }
        .container.active .back-aquarium { opacity: 1; }

        @media (max-width: 768px) {
            .glass-frame { display: none; }
            .container { min-height: 480px; }
            form { padding: 0 20px; }
            .overlay-content { padding: 0 20px; }
            h2 { font-size: 28px; }
            .overlay-content h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="glass-frame"></div>

    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <filter id="water-shake">
                <feTurbulence type="fractalNoise" baseFrequency="0 0" numOctaves="2" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G" id="displacement" />
            </filter>
        </defs>
    </svg>

    <div class="container" id="container">
        
        <canvas class="aquarium-canvas front-aquarium"></canvas>
        <canvas class="aquarium-canvas back-aquarium"></canvas>

        <div class="flip-wrapper">
            <div class="flip-card">
                <div class="card-side front-side">
                    <div class="overlay-panel" id="front-overlay">
                        <div class="overlay-content right-content">
                            
                        </div>
                    </div>
                </div>
                <div class="card-side back-side">
                    <div class="overlay-panel" id="back-overlay">
                        <div class="overlay-content left-content">
                            <h1>HELLO, FRIEND!</h1>
                            <p>Enter your personal details and start your journey with us today.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="forms-container">
            <div class="form-box login-box">
                <form id="loginForm">
                    <h2>Login</h2>
                    <div class="input-box">
                        <input type="email" id="loginEmail" required placeholder="Email">
                        <i class='bx bxs-envelope'></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="loginPass" required placeholder="Password">
                        <i class='bx bxs-lock-alt'></i>
                    </div>
                    <button type="submit" class="btn">Login</button>
                    <p class="switch-text">Don't have an account? <a href="#" id="to-signup">Sign Up</a></p>
                </form>
            </div>

            <div class="form-box signup-box">
                <form id="signupForm">
                    <h2>Sign Up</h2>
                    <div class="input-box">
                        <input type="text" id="signupUser" required placeholder="Username">
                        <i class='bx bxs-user'></i>
                    </div>
                    <div class="input-box">
                        <input type="email" id="signupEmail" required placeholder="Email">
                        <i class='bx bxs-envelope'></i>
                    </div>
                    <div class="input-box">
                        <input type="password" id="signupPass" required placeholder="Password">
                        <i class='bx bxs-lock-alt'></i>
                    </div>
                    <button type="submit" class="btn">Sign Up</button>
                    <p class="switch-text">Already have an account? <a href="#" id="to-login">Login</a></p>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
               // --- SUPABASE CONFIGURATION ---
        const SUPABASE_URL = "https://irbjtcwwcrqlfjqzdbku.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlyYmp0Y3d3Y3JycWxmanF6ZGt1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3NzY4MjMsImV4cCI6MjA5NjM1MjgyM30.thQuxp8kl6HTUnP-HcwlKnem4FYcym_LNq_UM_yzF5Y"; // PASTE YOUR KEY HERE

        // Initializing with specific auth settings to prevent status: 0 blocks
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                persistSession: false,
                autoRefreshToken: false
            }
        });

        // --- ANIMATIONS & FORM HANDLING ---
        const container = document.getElementById('container');
        const toSignup = document.getElementById('to-signup');
        const toLogin = document.getElementById('to-login');
        const frontOverlay = document.getElementById('front-overlay');
        const backOverlay = document.getElementById('back-overlay');
        const turbulence = document.querySelector('feTurbulence');
        const displacement = document.getElementById('displacement');
        let animationFrameId = null;

        function triggerWaterShake() {
            let start = null;
            const duration = 900;
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            function animate(timestamp) {
                if (!start) start = timestamp;
                let progress = timestamp - start;
                let timeFactor = progress / duration;
                if (timeFactor > 1) timeFactor = 1;
                let intensity = Math.sin(timeFactor * Math.PI); 
                let baseFreqX = intensity * 0.04; 
                let baseFreqY = intensity * 0.02;
                let scaleValue = intensity * 75; 
                if(turbulence) turbulence.setAttribute('baseFrequency', `${baseFreqX} ${baseFreqY}`);
                if(displacement) displacement.setAttribute('scale', scaleValue);
                if (progress < duration) {
                    animationFrameId = requestAnimationFrame(animate);
                } else {
                    if(turbulence) turbulence.setAttribute('baseFrequency', '0 0');
                    if(displacement) displacement.setAttribute('scale', '0');
                }
            }
            animationFrameId = requestAnimationFrame(animate);
        }

        function switchToSignUp() { container.classList.add('active'); triggerWaterShake(); }
        function switchToLogin() { container.classList.remove('active'); triggerWaterShake(); }

        toSignup.addEventListener('click', (e) => { e.preventDefault(); switchToSignUp(); });
        toLogin.addEventListener('click', (e) => { e.preventDefault(); switchToLogin(); });
        frontOverlay.addEventListener('click', () => { switchToSignUp(); });
        backOverlay.addEventListener('click', () => { switchToLogin(); });

        // --- AUTH SUBMISSIONS ---
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('signupUser').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPass').value;

            try {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: { data: { display_name: username } }
                });

                if (error) throw error;
                alert("Sign up complete! Welcome aboard.");
                document.getElementById('signupForm').reset();
                switchToLogin(); 
            } catch (err) {
                console.error("Auth Error:", err);
                alert("Sign up error: " + (err.message || "Failed to reach server. Check your connection."));
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;

            try {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;
                alert("Login successful!");
            } catch (err) {
                console.error("Auth Error:", err);
                alert("Login error: " + (err.message || "Failed to reach server. Check your connection."));
            }
        });

        // --- AQUARIUM CANVAS LAYERS (Unchanged) ---
        const canvases = document.querySelectorAll('.aquarium-canvas');
        const aquariumSystems = [];

        class GlowingFish {
            constructor(canvasWidth, canvasHeight) {
                this.canvasWidth = canvasWidth; this.canvasHeight = canvasHeight;
                this.x = Math.random() * canvasWidth; this.y = Math.random() * canvasHeight;
                this.length = Math.random() * 20 + 20; this.width = this.length * 0.4;
                this.speedX = (Math.random() - 0.5) * 1.5; if (Math.abs(this.speedX) < 0.3) this.speedX = 0.5; 
                this.speedY = (Math.random() - 0.5) * 0.4;
                const colors = ['#00ffcc', '#ff007f', '#39ff14', '#00bfff', '#ff9933', '#bd00ff'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.tailWave = Math.random() * Math.PI * 2; this.tailWaveSpeed = Math.random() * 0.1 + 0.15;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY; this.tailWave += this.tailWaveSpeed;
                this.speedY += (Math.random() - 0.5) * 0.05; if (Math.abs(this.speedY) > 0.5) this.speedY *= 0.9;
                if (this.x < -this.length) this.x = this.canvasWidth + this.length;
                else if (this.x > this.canvasWidth + this.length) this.x = -this.length;
                if (this.y < 30) { this.y = 30; this.speedY *= -1; }
                else if (this.y > this.canvasHeight - 30) { this.y = this.canvasHeight - 30; this.speedY *= -1; }
            }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y); if (this.speedX < 0) ctx.scale(-1, 1);
                ctx.shadowBlur = 15; ctx.shadowColor = this.color; ctx.fillStyle = this.color; ctx.strokeStyle = this.color;
                ctx.beginPath(); ctx.ellipse(0, 0, this.length / 2, this.width / 2, 0, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); const tailOffset = Math.sin(this.tailWave) * 5; ctx.moveTo(-this.length / 2, 0);
                ctx.lineTo(-this.length * 0.9, -this.width * 0.7 + tailOffset); ctx.lineTo(-this.length * 0.75, tailOffset * 0.5);
                ctx.lineTo(-this.length * 0.9, this.width * 0.7 + tailOffset); ctx.closePath(); ctx.fill();
                ctx.beginPath(); ctx.ellipse(-this.length * 0.1, this.width * 0.2, this.length * 0.15, this.width * 0.2, Math.PI / 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 0; ctx.beginPath(); ctx.arc(this.length * 0.25, -this.width * 0.15, 2, 0, Math.PI * 2); ctx.fill(); ctx.restore();
            }
        }

        class FloatingBubble {
            constructor(canvasWidth, canvasHeight) {
                this.canvasWidth = canvasWidth; this.canvasHeight = canvasHeight;
                this.x = Math.random() * canvasWidth; this.y = canvasHeight + Math.random() * 20;
                this.radius = Math.random() * 2 + 1; this.speedY = Math.random() * 0.6 + 0.4;
                this.wobble = Math.random() * Math.PI; this.wobbleSpeed = Math.random() * 0.02 + 0.01;
            }
            update() {
                this.y -= this.speedY; this.wobble += this.wobbleSpeed; this.x += Math.sin(this.wobble) * 0.2;
                if (this.y < -10) { this.y = this.canvasHeight + 10; this.x = Math.random() * this.canvasWidth; }
            }
            draw(ctx) {
                ctx.save(); ctx.translate(this.x, this.y); ctx.strokeStyle = 'rgba(0, 255, 204, 0.3)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
            }
        }

        function initAquarium() {
            const rect = container.getBoundingClientRect();
            if (!rect.width || !rect.height) return; 
            aquariumSystems.length = 0;
            canvases.forEach((canvas) => {
                canvas.width = rect.width; canvas.height = rect.height;
                const system = { canvas: canvas, ctx: canvas.getContext('2d'), fishList: [], bubbleList: [] };
                for (let i = 0; i < 5; i++) system.fishList.push(new GlowingFish(canvas.width, canvas.height));
                for (let b = 0; b < 10; b++) system.bubbleList.push(new FloatingBubble(canvas.width, canvas.height));
                aquariumSystems.push(system);
            });
        }

        window.addEventListener('resize', initAquarium);
        setTimeout(() => { initAquarium(); playAquarium(); }, 50);

        function playAquarium() {
            requestAnimationFrame(playAquarium);
            aquariumSystems.forEach(sys => {
                sys.ctx.clearRect(0, 0, sys.canvas.width, sys.canvas.height);
                sys.bubbleList.forEach(bubble => { bubble.update(); bubble.draw(sys.ctx); });
                sys.fishList.forEach(fish => { fish.update(); fish.draw(sys.ctx); });
            });
        }

    </script>
</body>
</html>
